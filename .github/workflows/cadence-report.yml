name: Cadence report

# Phase 4 deliverable W0.7. Runs scripts/changelog_cadence.py
# weekly during the four-week feature freeze, computes the
# 7-day Added/Changed/Fixed/Security breakdown for the current
# freeze week, and commits the report to
# docs/specs/downstream-validation/cadence-week-{N}.md.
#
# Triggers:
# - Cron: Mondays 12:00 UTC (early enough to catch any Friday/
#   weekend churn; late enough to give US-east contributors a
#   coffee window after waking up).
# - workflow_dispatch: for back-fills + smoke runs.
#
# Outside the freeze window the workflow exits cleanly with a
# notice — no report is written for pre-freeze or post-freeze
# weeks.
#
# Status semantics (per scripts/changelog_cadence.py):
# - Added == 0 in the window → ON TRACK.
# - Added  > 0               → RESET (cadence clock resets;
#   freeze extends per the spec's risks table).
#
# The commit message reflects status so the maintainer can spot
# resets in `git log` without opening the report.

on:
  schedule:
    - cron: "0 12 * * 1"  # Mondays at noon UTC
  workflow_dispatch:
    inputs:
      end_date:
        description: "Override the window end date (YYYY-MM-DD). Default: today UTC."
        required: false
        default: ""

# Default: read-only. The cadence-report job widens to write so
# it can commit the weekly report.
permissions:
  contents: read

concurrency:
  group: cadence-report
  cancel-in-progress: false  # serialize back-to-back dispatches

jobs:
  cadence-report:
    name: Weekly cadence report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # Bot opens a PR with the weekly report (direct push to main
      # is rejected by branch protection). Needs:
      contents: write  # to push the auto-branch
      pull-requests: write  # to open the PR
    env:
      # Freeze window per the approved spec
      # (docs/specs/downstream-validation/tasks.md "Calendar
      # (proposed)"). Update both if the freeze schedule shifts.
      FREEZE_START: "2026-05-24"
      FREEZE_END: "2026-06-20"
      FREEZE_TOTAL_WEEKS: "4"
      REPORT_DIR: docs/specs/downstream-validation

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      # ── Decide the window + freeze-week ────────────────────────
      # User-controlled override path (workflow_dispatch input)
      # uses env passing, not ${{ }} interpolation, mirroring the
      # benchmark.yml + freeze.yml pattern.
      - name: Resolve window
        id: window
        env:
          OVERRIDE_END: ${{ inputs.end_date }}
        run: |
          set -euo pipefail
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import date, datetime, timedelta

          def _parse(s: str) -> date:
              return datetime.strptime(s, "%Y-%m-%d").date()

          override = os.environ.get("OVERRIDE_END", "").strip()
          if override:
              end = _parse(override)
          else:
              end = date.today()

          freeze_start = _parse(os.environ["FREEZE_START"])
          freeze_end = _parse(os.environ["FREEZE_END"])
          total = int(os.environ["FREEZE_TOTAL_WEEKS"])

          if end < freeze_start:
              print("skip=true")
              print(f"reason=Freeze hasn't started yet (freeze_start={freeze_start}).")
              raise SystemExit
          if end > freeze_end:
              print("skip=true")
              print(f"reason=Freeze ended on {freeze_end}.")
              raise SystemExit

          # Week 1 = freeze_start through freeze_start+6d.
          week = (end - freeze_start).days // 7 + 1
          start = end - timedelta(days=6)
          print("skip=false")
          print(f"end={end.isoformat()}")
          print(f"start={start.isoformat()}")
          print(f"week={week}")
          print(f"total={total}")
          PY
        shell: bash

      # ── Run the cadence parser ─────────────────────────────────
      - name: Run cadence parser
        if: steps.window.outputs.skip != 'true'
        env:
          END: ${{ steps.window.outputs.end }}
          WEEK: ${{ steps.window.outputs.week }}
          TOTAL: ${{ steps.window.outputs.total }}
        run: |
          set -euo pipefail
          OUT="${REPORT_DIR}/cadence-week-${WEEK}.md"
          python scripts/changelog_cadence.py \
            --end-date "$END" \
            --window-days 7 \
            --freeze-week "$WEEK" \
            --freeze-total "$TOTAL" \
            --out "$OUT"
          echo "REPORT_PATH=$OUT" >> "$GITHUB_ENV"
          # Extract status line for the commit message.
          STATUS=$(grep -E '^\*\*Status:\*\*' "$OUT" | sed 's/\*\*Status:\*\* //')
          echo "REPORT_STATUS=$STATUS" >> "$GITHUB_ENV"
        shell: bash

      # ── Open PR with the cadence report if it changed ──────────
      # main is a protected branch — direct push is rejected. Bot
      # creates a branch + commits + opens a PR; maintainer (or
      # `gh pr merge --admin`) lands it.
      - name: Open PR with cadence report
        if: steps.window.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEEK: ${{ steps.window.outputs.week }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "$REPORT_PATH"
          if git diff --cached --quiet; then
            echo "::notice::Cadence report unchanged for week $WEEK; skipping PR."
            exit 0
          fi
          # Tag RESET commits prominently in the log + PR title.
          if printf '%s' "$REPORT_STATUS" | grep -qE '^RESET'; then
            PREFIX="🚨 cadence: RESET — week $WEEK"
          else
            PREFIX="cadence: week $WEEK — $REPORT_STATUS"
          fi
          BRANCH="auto/cadence-week-${WEEK}-r${RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "$PREFIX

          Auto-generated by .github/workflows/cadence-report.yml.
          See $REPORT_PATH for the breakdown.
          Phase 4 W0.7 cadence-monitor output."
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$PREFIX" \
            --body "Auto-generated by the \`cadence-report\` workflow (run id \`$RUN_ID\`).

          - Week: $WEEK / ${{ env.FREEZE_TOTAL_WEEKS }}
          - Report: \`$REPORT_PATH\`
          - Status: $REPORT_STATUS

          Merging this lands the weekly cadence record on \`main\` for the audit trail. Phase 4 W0.7."
        shell: bash

      # ── Summarize the verdict in the run UI ────────────────────
      - name: Summary
        if: always()
        env:
          SKIP: ${{ steps.window.outputs.skip }}
          REASON: ${{ steps.window.outputs.reason }}
          WEEK: ${{ steps.window.outputs.week }}
          STATUS: ${{ env.REPORT_STATUS }}
        run: |
          {
            echo "### attune-rag cadence report"
            echo ""
            if [ "$SKIP" = "true" ]; then
              echo "- Skipped: ${REASON:-(no reason given)}"
            else
              echo "- Week: ${WEEK:-?} / ${{ env.FREEZE_TOTAL_WEEKS }}"
              echo "- Status: ${STATUS:-(parser did not produce a status)}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash
