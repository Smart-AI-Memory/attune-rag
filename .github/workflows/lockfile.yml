name: Lockfile

# Verifies uv.lock matches pyproject.toml on every PR + push to main.
# Without this check, lockfile drift goes silent — the attune-rag repo
# had uv.lock but nothing verifying it, and the lockfile silently drifted
# from 0.1.22 to 0.1.23 (then would have drifted to 0.2.0+) without anyone
# noticing until a release-time pip-install reproducibility issue.
#
# Same class of bug we caught on attune-ai's v7.1.0 ship — surfaced
# there only because attune-ai's pre-commit happens to run `uv run`,
# which auto-regenerates uv.lock as a side effect. This workflow is
# the explicit version of that protection.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  uv-lock-check:
    name: uv-lock-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.22"

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check
