version: 1

features:
  pipeline:
    description: Orchestrate retrieval, prompt assembly, and LLM generation in a single RagPipeline.run() call — returns RagResult with the answer and CitationRecord provenance
    files:
      - src/attune_rag/pipeline.py
      - src/attune_rag/__init__.py
    tags: [pipeline, orchestration, rag, result]

  retrieval:
    description: Keyword-based retrieval over a corpus — KeywordRetriever scores and ranks RetrievalEntry objects against a query using stemming and stopword filtering
    files:
      - src/attune_rag/retrieval.py
    tags: [retrieval, keyword, scoring, ranking]

  corpus:
    description: Pluggable corpus loaders — CorpusProtocol defines the interface; DirectoryCorpus loads markdown from disk; AttuneHelpCorpus wraps the bundled attune-help templates
    files:
      - src/attune_rag/corpus/__init__.py
      - src/attune_rag/corpus/base.py
      - src/attune_rag/corpus/directory.py
      - src/attune_rag/corpus/attune_help.py
    tags: [corpus, loader, markdown, attune-help]

  prompts:
    description: Prompt assembly — build_augmented_prompt injects retrieved passages as grounding context; PROMPT_VARIANTS selects citation, grounded, or default prompt styles
    files:
      - src/attune_rag/prompts.py
    tags: [prompts, templates, augmentation, citation]

  provenance:
    description: Citation tracking — CitationRecord and CitedSource capture which corpus entries grounded each answer; format_citations_markdown renders them for display
    files:
      - src/attune_rag/provenance.py
    tags: [provenance, citations, traceability]

  providers:
    description: LLM provider adapters — LLMProvider protocol with claude, openai, and gemini implementations; each lazy-imports its SDK so core installs cleanly
    files:
      - src/attune_rag/providers/__init__.py
      - src/attune_rag/providers/base.py
      - src/attune_rag/providers/claude.py
      - src/attune_rag/providers/openai.py
      - src/attune_rag/providers/gemini.py
    tags: [providers, llm, claude, openai, gemini]

  eval:
    description: Faithfulness evaluation — FaithfulnessJudge uses Claude tool-use to score whether answer claims are supported by retrieved passages; benchmark prompts for golden-set testing
    files:
      - src/attune_rag/eval/__init__.py
      - src/attune_rag/eval/faithfulness.py
      - src/attune_rag/eval/bench_prompts.py
    tags: [eval, faithfulness, judge, hallucination, scoring]

  benchmark:
    description: Precision/recall/faithfulness benchmark runner, installed as the attune-rag-benchmark console script — gates CI on configurable thresholds; --retriever {keyword,hybrid,transformer} benchmarks each retrieval tier (exits 2 with an install hint when the tier's extra is missing); supports custom query files, abstention-threshold calibration via --calibrate-abstention, and optional faithfulness scoring via --with-faithfulness
    files:
      - src/attune_rag/benchmark.py
    tags: [benchmark, ci, precision, recall, quality, retriever-tiers]

  cli:
    description: Command-line interface — attune-rag query runs a RAG query and prints the grounded answer with citations; --corpus-path points it at your own markdown directory, --retriever {keyword,hybrid,transformer} selects the opt-in retrieval ladder, --min-score sets the keyword abstention threshold, --prompt-variant picks the prompt template; attune-rag corpus-info shows corpus statistics (also accepts --corpus-path); attune-rag providers lists LLM providers whose extras are installed; setup errors (missing extras, bad paths, conflicting flags) print a one-line actionable message and exit 2 instead of a traceback
    files:
      - src/attune_rag/cli.py
    tags: [cli, query, corpus-info, corpus-path, retriever-tiers, abstention]

  editor:
    description: Headless template-editor primitives — load_schema parses the v1 frontmatter contract; parse_frontmatter and validate_frontmatter split and check templates; lint_template returns 1-indexed Diagnostics; autocomplete_tags/aliases prefix-match against the corpus; find_references locates alias/tag/path occurrences; plan_rename builds a RenamePlan with per-file FileEdit hunks; apply_rename runs the plan atomically with rollback. Pure functions over CorpusProtocol — used live by the attune-gui editor and attune-author edit CLI.
    files:
      - src/attune_rag/editor/__init__.py
      - src/attune_rag/editor/schema.py
      - src/attune_rag/editor/lint.py
      - src/attune_rag/editor/autocomplete.py
      - src/attune_rag/editor/references.py
      - src/attune_rag/editor/rename.py
    tags: [editor, lint, rename, autocomplete, schema, references, refactor, template]

  dashboard:
    description: Living-docs dashboard for a registered corpus — three-stage pipeline (refresh → render → show). refresh runs the benchmark against the corpus and emits a snapshot JSON; render produces a packaged HTML report; show pretty-prints the snapshot to the terminal via Rich. Each stage has its own CLI entry point under `attune-rag dashboard`.
    files:
      - src/attune_rag/dashboard/__init__.py
      - src/attune_rag/dashboard/refresh.py
      - src/attune_rag/dashboard/render.py
      - src/attune_rag/dashboard/show.py
    tags: [dashboard, living-docs, html, terminal, snapshot, freshness]

  expander:
    description: LLM-powered query expansion — QueryExpander uses Claude Haiku to broaden a user query into related terms and synonyms before keyword retrieval, lifting recall on queries with low surface-level overlap against the target documents. Opt-in and fail-safe — any API error falls back to the original query order.
    files:
      - src/attune_rag/expander.py
    tags: [expander, hybrid-retrieval, recall, claude, haiku]

  reranker:
    description: LLM-powered re-ranking — LLMReranker uses Claude Haiku as a relevance judge over the top-K keyword-retrieved candidates, producing a precision-optimized order. Opt-in and fail-safe — any API error falls back to the keyword-only order.
    files:
      - src/attune_rag/reranker.py
    tags: [reranker, hybrid-retrieval, precision, claude, haiku]

  measure:
    description: Retrieval-quality measurement on your own corpus — the attune-rag-measure console script (attune_rag.measure_corpus) scores P@1 / R@3 against a golden-query YAML for --corpus-path or the bundled corpus; --retriever {keyword,hybrid,transformer} compares the retrieval tiers so you can measure the paraphrase-recall lift before installing a heavyweight extra (exits 2 with an install hint when the tier's extra is missing); emits markdown or JSON reports with configurable --watermark-r3 / --watermark-p1 gates
    files:
      - src/attune_rag/measure_corpus.py
    tags: [measure, corpus, quality, watermark, retriever-tiers, p-at-1, r-at-3]
