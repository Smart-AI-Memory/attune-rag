# Golden queries for retrieval quality benchmarking.
#
# Each query asserts the RAG pipeline surfaces the *right*
# template(s) from the attune-help corpus. Used by:
#   - tests/golden/test_golden.py (regression gate)
#   - src/attune_rag/benchmark.py (precision@1, recall@3)
#
# Difficulty legend:
#   easy   — direct feature asks, one primary template target
#   medium — synonyms / paraphrases
#   hard   — ambiguous wording or where lesson-corpus entries
#            compete with concept/quickstart entries
#
# expected_feature: canonical feature name (documents intent)
# expected_in_top_3: template paths that SHOULD appear in the
#     top 3 hits. At least one must be present for a pass.

version: 1

queries:
  # -------- Easy: direct feature names --------

  - id: gq-001
    query: "how do I run a security audit"
    expected_feature: security-audit
    expected_in_top_3:
      - quickstarts/run-security-audit.md
      - concepts/tool-security-audit.md
    difficulty: easy

