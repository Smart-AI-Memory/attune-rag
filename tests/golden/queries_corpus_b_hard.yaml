# Expanded HARD paraphrase set for the unseen corpus (corpus_b).
#
# Purpose: validate the confidence-gated-retrieval finding at n>=30 (the
# original corpus_b hard tier was only 4 queries). These are natural
# lay-language paraphrases that deliberately AVOID each target doc's
# distinctive vocabulary — the generalization stress case where keyword
# overlap is low and a retrieval-tuned embedding leg should rescue.
#
# Authored blind to retrieval behavior (grounded in each doc's TOPIC, not
# its scoring) to avoid confirmation bias. Where two docs genuinely both
# answer, both are listed (as in queries_corpus_b.yaml).
#
# Advisory side-file. Never gates; never edits the SHA-locked queries.yaml.
# Used by docs/specs/confidence-gated-retrieval M1 validation.

version: 1

