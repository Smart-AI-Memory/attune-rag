# Second arbitrary corpus (corpus_c — an HTTP API client library) HARD
# paraphrase set, for docs/specs/transformer-retriever M1: validate that
# the transformer advantage over torch-free generalizes beyond corpus_b.
#
# Different domain (HTTP client) and jargon (bearer token, 429, cursor,
# multipart) from corpus_b (job scheduler). Lay-language paraphrases that
# deliberately avoid each doc's distinctive vocabulary. Authored blind to
# retrieval behavior. Advisory side-file; never gates; never edits the
# SHA-locked queries.yaml.

version: 1

