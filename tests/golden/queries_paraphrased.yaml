# Paraphrased golden queries — diagnostic-1 (EmbeddingRetriever feasibility).
#
# Each entry mirrors a `queries.yaml` golden query under the same id stem
# (gqp-NNN[a|b]), with the same `expected_in_top_3` and `difficulty`. The
# query text is rewritten to suppress overlap with tokens that appear in
# the target template's path / summary / aliases, while staying inside
# realistic developer phrasing.
#
# The goal: measure how much KeywordRetriever degrades when the query no
# longer shares feature-name tokens with the target. The size of that
# degradation is the EmbeddingRetriever case (or absence of one).
#
# NOT a regression gate — diagnostic only. Run via
# `docs/specs/embedding-retriever/run_diagnostic_1.py`.

